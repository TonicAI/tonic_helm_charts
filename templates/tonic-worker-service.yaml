{{- $worker := .Values.tonicai.worker }}
{{- $ports := fromYaml (include "tonic.ports" (list $ $worker.ports (dict "http" 8080 "https" 4433 "httpsOnly" true)))  }}
apiVersion: v1
kind: Service
metadata:
  annotations:
    {{- include "tonic.annotations" (list $) | nindent 4 }}
  labels:
    {{- include "tonic.allLabels" (list $ (dict "app" "tonic-worker")) | nindent 4 }}
  name: tonic-worker
  namespace: {{ .Release.Namespace }}
spec:
  ports:
  {{- if not $ports.httpsOnly }}
  - name: {{ $ports.http | quote }}
    port: {{ $ports.http }}
    targetPort: http
  {{- end }}
  - name: {{ $ports.https | quote }}
    port: {{ $ports.https }}
    targetPort: https
  selector:
    app: tonic-worker
status:
  loadBalancer: {}
